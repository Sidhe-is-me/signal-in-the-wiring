# Iomrá — ESPHome Voice Satellite Configuration
# ESP32-S3-DevKitC-1 with I2S mic, I2S amp, NeoPixel ring, servo
#
# Prerequisites:
#   - Home Assistant with Anthropic integration configured
#   - Whisper + Piper add-ons (or cloud STT/TTS)
#   - ESPHome add-on installed
#
# Flash: esphome run iomra-esphome.yaml

esphome:
  name: iomra
  friendly_name: "Iomrá"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended

# --- WiFi ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP recommended for voice satellites
  # manual_ip:
  #   static_ip: 192.168.0.XXX
  #   gateway: 192.168.0.1
  #   subnet: 255.255.255.0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:

# --- I2S Microphone (INMP441) ---
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO5   # WS
    i2s_bclk_pin: GPIO6    # SCK
  - id: i2s_out
    i2s_lrclk_pin: GPIO16  # WS
    i2s_bclk_pin: GPIO17   # SCK

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_in
    adc_type: external
    i2s_din_pin: GPIO4     # SD
    pdm: false
    channel: left
    bits_per_sample: 32bit

# --- I2S Speaker (MAX98357A) ---
speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: GPIO15   # DIN
    mode: mono

# --- Voice Assistant Pipeline ---
voice_assistant:
  id: va
  microphone: mic
  speaker: spk
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 3.0
  on_wake_word_detected:
    - light.turn_on:
        id: led_ring
        effect: "listening"
    - servo.write:
        id: tilt_servo
        level: 75%   # lean forward
  on_stt_end:
    - light.turn_on:
        id: led_ring
        effect: "thinking"
  on_tts_start:
    - light.turn_on:
        id: led_ring
        effect: "speaking"
  on_tts_end:
    - servo.write:
        id: tilt_servo
        level: 50%   # return to neutral
    - delay: 2s
    - light.turn_on:
        id: led_ring
        effect: "idle"
  on_error:
    - light.turn_on:
        id: led_ring
        brightness: 30%
        red: 100%
        green: 0%
        blue: 0%
    - servo.write:
        id: tilt_servo
        level: 50%

# --- micro Wake Word ---
micro_wake_word:
  models:
    - model: hey_jarvis  # placeholder — train custom "Iomrá" later
  on_wake_word_detected:
    - voice_assistant.start

# --- NeoPixel LED Ring (12 LEDs, WS2812B) ---
light:
  - platform: neopixelbus
    id: led_ring
    type: GRB
    variant: WS2812
    pin: GPIO48
    num_leds: 12
    name: "Iomrá Ring"
    effects:
      - addressable_lambda:
          name: "idle"
          update_interval: 50ms
          lambda: |-
            // Single amber pixel, slow breathing
            static float brightness = 0;
            static float direction = 0.01;
            brightness += direction;
            if (brightness >= 0.3 || brightness <= 0.0) direction = -direction;
            it.all() = Color(0, 0, 0);
            it[0] = Color(255, 179, 71);  // #FFB347 amber
            it[0] = it[0] * (int)(brightness * 255);
      - addressable_lambda:
          name: "listening"
          update_interval: 16ms
          lambda: |-
            // Full ring steady amber
            for (int i = 0; i < 12; i++) {
              it[i] = Color(255, 179, 71);
            }
      - addressable_lambda:
          name: "thinking"
          update_interval: 60ms
          lambda: |-
            // Clockwise chase
            static int pos = 0;
            it.all() = Color(0, 0, 0);
            for (int i = 0; i < 3; i++) {
              it[(pos + i) % 12] = Color(255, 179, 71);
            }
            pos = (pos + 1) % 12;
      - addressable_lambda:
          name: "speaking"
          update_interval: 80ms
          lambda: |-
            // Gentle pulse
            static float brightness = 0.5;
            static float dir = 0.05;
            brightness += dir;
            if (brightness >= 1.0 || brightness <= 0.4) dir = -dir;
            for (int i = 0; i < 12; i++) {
              it[i] = Color(255, 179, 71) * (int)(brightness * 255);
            }
      - addressable_lambda:
          name: "schumann"
          update_interval: 100ms
          lambda: |-
            // Deep blue slow breathe — Schumann field active
            static float brightness = 0.2;
            static float dir = 0.008;
            brightness += dir;
            if (brightness >= 0.5 || brightness <= 0.15) dir = -dir;
            for (int i = 0; i < 12; i++) {
              it[i] = Color(30, 60, 180) * (int)(brightness * 255);
            }

# --- Tilt Servo (SG90) ---
servo:
  - id: tilt_servo
    output: servo_output
    auto_detach_time: 3s    # stop buzzing after movement
    transition_length: 800ms # smooth movement

output:
  - platform: ledc
    id: servo_output
    pin: GPIO18
    frequency: 50Hz
  - platform: ledc
    id: schumann_output
    pin: GPIO7
    frequency: 7.83Hz

# --- Schumann Resonance Generator (7.83 Hz coil driver) ---
switch:
  - platform: output
    id: schumann_switch
    name: "Iomrá Schumann Field"
    output: schumann_output
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - output.set_level:
          id: schumann_output
          level: 50%   # 50% duty cycle square wave
      - light.turn_on:
          id: led_ring
          effect: "schumann"
    on_turn_off:
      - output.set_level:
          id: schumann_output
          level: 0%
      - light.turn_on:
          id: led_ring
          effect: "idle"
